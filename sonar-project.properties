# SonarQube project configuration for the DevSecOps Node.js app
sonar.projectKey=DevSecOps-Pipeline-Project
sonar.projectName=DevSecOps Pipeline Project
sonar.projectVersion=1.0

# Source directory (relative to project root)
sonar.sources=app

# Exclude test files, coverage outputs, and dependencies from analysis
sonar.exclusions=**/node_modules/**,**/coverage/**,**/*.test.js,**/*.spec.js

# Coverage report — generated by 'npm test' (Jest with lcov reporter)
sonar.javascript.lcov.reportPaths=app/coverage/lcov.info

# Language
sonar.language=js

# Encoding
sonar.sourceEncoding=UTF-8

# SonarQube server — overridden by -Dsonar.host.url in CI
sonar.host.url=http://localhost:9000
