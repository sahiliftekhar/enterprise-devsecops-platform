############################################################
# Enterprise DevSecOps Platform
############################################################

services:

############################################################
# PostgreSQL (SonarQube Database)
############################################################

  sonar-db:

    image: postgres:15

    container_name: devsecops-sonar-db

    restart: unless-stopped

    environment:
      POSTGRES_USER: sonar
      POSTGRES_PASSWORD: sonar
      POSTGRES_DB: sonarqube

    volumes:
      - devsecops_postgresql_data:/var/lib/postgresql/data

    networks:
      - devsecops-network

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U sonar"]
      interval: 10s
      timeout: 5s
      retries: 10

############################################################
# SonarQube
############################################################

  sonarqube:

    image: sonarqube:community

    container_name: devsecops-sonarqube

    restart: unless-stopped

    depends_on:
      sonar-db:
        condition: service_healthy

    ports:
      - "9001:9000"

    environment:
      SONAR_JDBC_URL: jdbc:postgresql://sonar-db:5432/sonarqube
      SONAR_JDBC_USERNAME: sonar
      SONAR_JDBC_PASSWORD: sonar

    volumes:
      - devsecops_sonarqube_data:/opt/sonarqube/data
      - devsecops_sonarqube_extensions:/opt/sonarqube/extensions
      - devsecops_sonarqube_logs:/opt/sonarqube/logs

    networks:
      - devsecops-network


############################################################
# Jenkins
############################################################

  jenkins:

    build:
      context: ./jenkins
      dockerfile: Dockerfile

    image: custom-jenkins:lts

    container_name: devsecops-jenkins

    restart: unless-stopped


    user: root

    depends_on:
    - sonarqube

    ports:
      - "8081:8080"

    environment:
      TZ: Asia/Kolkata

    volumes:
      - jenkins_home:/var/jenkins_home
      - /var/run/docker.sock:/var/run/docker.sock

    networks:
      - devsecops-network

    healthcheck:
      test: ["CMD-SHELL", "curl -fs http://localhost:8080/login >/dev/null || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 10
      start_period: 120s

############################################################
# Future Monitoring Services
############################################################

# prometheus:
#   profiles:
#     - monitoring

# grafana:
#   profiles:
#     - monitoring

# node-exporter:
#   profiles:
#     - monitoring

############################################################
# Future Security Services
############################################################

# zap:
#   profiles:
#     - security

############################################################
# Networks
############################################################

networks:

  devsecops-network:

    driver: bridge

############################################################
# Volumes
############################################################

volumes:

  devsecops_postgresql_data:

  devsecops_sonarqube_data:

  devsecops_sonarqube_extensions:

  devsecops_sonarqube_logs:

  jenkins_home: